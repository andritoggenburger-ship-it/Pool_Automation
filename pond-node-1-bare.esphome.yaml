substitutions:
  node_name: pond-node-1
  friendly_name: Pond Node 1

  # Depth calibration values
  depth_cal_min_ma: "4.0"      # Current at minimum level
  depth_cal_max_ma: "20.0"     # Current at maximum level
  depth_cal_min_m: "0.0"       # Minimum depth in meters
  depth_cal_max_m: "5.0"       # Maximum depth in meters
  depth_cal_offset_m: "0.0"    # Optional trim offset after scaling

  # Replace with the discovered DS18B20 ROM from ESPHome logs.
  ds18_addr_1: "0x0000000000000001"

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 100%
          blue: 100%
          brightness: 100%
      - delay: 700ms
      - light.turn_off: status_led

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: !secret wifi_fallback_ssid
    password: !secret fallback_password

captive_portal:

i2c:
  sda: GPIO20
  scl: GPIO21
  scan: true
  frequency: 100kHz

one_wire:
  - platform: gpio
    pin: GPIO10

sensor:
  - platform: wifi_signal
    name: Pond Node WiFi RSSI
    update_interval: 60s

  - platform: uptime
    name: Pond Node Uptime
    update_interval: 60s

  - platform: ina219
    id: ina219_main
    address: 0x40
    shunt_resistance: 0.1 ohm
    max_voltage: 26.0V
    max_current: 0.4A
    update_interval: 30s
    current:
      id: pond_sensor_current_ma
      name: Pond Sensor Current
      unit_of_measurement: mA
      accuracy_decimals: 2
      filters:
        - multiply: 1000.0

  - platform: template
    name: Pond Water Depth
    unit_of_measurement: m
    accuracy_decimals: 2
    update_interval: 30s
    lambda: |-
      const float min_ma = ${depth_cal_min_ma};
      const float max_ma = ${depth_cal_max_ma};
      const float min_m = ${depth_cal_min_m};
      const float max_m = ${depth_cal_max_m};
      const float offset_m = ${depth_cal_offset_m};

      float current_ma = id(pond_sensor_current_ma).state;
      if (isnan(current_ma)) {
        return NAN;
      }

      // Clamp current to configured range.
      if (current_ma < min_ma) current_ma = min_ma;
      if (current_ma > max_ma) current_ma = max_ma;

      float depth_m = min_m + ((current_ma - min_ma) * (max_m - min_m) / (max_ma - min_ma));
      depth_m += offset_m;

      // Clamp output depth to configured range after offset.
      if (depth_m < min_m) depth_m = min_m;
      if (depth_m > max_m) depth_m = max_m;

      return depth_m;

  - platform: dallas_temp
    name: Pond Temp Sensor 1
    address: ${ds18_addr_1}
    update_interval: 30s

binary_sensor:
  - platform: status
    name: Pond Node Status

button:
  - platform: restart
    name: Pond Node Restart

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Pond Node RGB LED
    pin: GPIO8
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    restore_mode: ALWAYS_OFF

interval:
  - interval: 3s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 0%
                blue: 100%
                brightness: 100%
            - delay: 500ms
            - light.turn_off: status_led
          else:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
            - delay: 150ms
            - light.turn_off: status_led
            - delay: 150ms
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
            - delay: 150ms
            - light.turn_off: status_led