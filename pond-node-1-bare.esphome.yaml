substitutions:
  node_name: pond-node-1
  friendly_name: Pond Node 1

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 100%
          blue: 100%
          brightness: 100%
      - delay: 700ms
      - light.turn_off: status_led

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: !secret wifi_fallback_ssid
    password: !secret fallback_password

captive_portal:

sensor:
  - platform: wifi_signal
    name: Pond Node WiFi RSSI
    update_interval: 60s

  - platform: uptime
    name: Pond Node Uptime
    update_interval: 60s

binary_sensor:
  - platform: status
    name: Pond Node Status

button:
  - platform: restart
    name: Pond Node Restart

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Pond Node RGB LED
    pin: GPIO8
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    restore_mode: ALWAYS_OFF

interval:
  - interval: 3s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 0%
                blue: 100%
                brightness: 100%
            - delay: 500ms
            - light.turn_off: status_led
          else:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
            - delay: 150ms
            - light.turn_off: status_led
            - delay: 150ms
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
            - delay: 150ms
            - light.turn_off: status_led