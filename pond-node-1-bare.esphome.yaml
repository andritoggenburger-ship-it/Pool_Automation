substitutions:
  node_name: pond-node-1
  friendly_name: Pond Node 1

  # Depth calibration values
  depth_cal_min_ma: "4.0"      # Current at minimum level
  depth_cal_max_ma: "20.0"     # Current at maximum level
  depth_cal_min_m: "0.0"       # Minimum depth in meters
  depth_cal_max_m: "3.0769"    # Calibrated effective maximum depth in meters
  depth_cal_offset_m: "0.94"   # Calibrated trim offset after scaling

  # DS18B20 calibration/discovery values
  ds18_addr_1: "0x08000000ca532328"  # Deep sensor
  ds18_addr_2: "0x68000000ca317728"  # Skimmer sensor

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 100%
          blue: 100%
          brightness: 100%
      - delay: 700ms
      - light.turn_off: status_led

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_2
      password: !secret wifi_password_2
  power_save_mode: none
  output_power: 20.0dB
  fast_connect: false
  ap:
    ssid: !secret wifi_fallback_ssid
    password: !secret fallback_password_pond_node

captive_portal:

i2c:
  sda: GPIO20
  scl: GPIO21
  scan: true
  frequency: 100kHz

one_wire:
  - platform: gpio
    # Pond deep DS18B20 last-meter Ethernet mapping:
    # data (yellow) -> Ethernet green
    # ground -> Ethernet green/white
    # 3.3V -> Ethernet blue
    pin: GPIO19

globals:
  - id: pond_temp_deep_error_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: pond_temp_deep_last_valid
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: pond_temp_deep_has_last_valid
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pond_temp_skimmer_error_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: pond_temp_skimmer_last_valid
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: pond_temp_skimmer_has_last_valid
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pond_depth_displayed_m
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: pond_depth_has_displayed
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pond_depth_pending_direction
    type: int
    restore_value: no
    initial_value: '0'
  - id: pond_depth_pending_since_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

text_sensor:
  - platform: wifi_info
    ssid:
      name: Pond Node WiFi SSID

sensor:
  - platform: wifi_signal
    name: Pond Node WiFi RSSI
    update_interval: 60s

  - platform: uptime
    name: Pond Node Uptime
    update_interval: 60s

  - platform: ina219
    id: ina219_main
    address: 0x40
    shunt_resistance: 0.1 ohm
    max_voltage: 26.0V
    max_current: 0.4A
    update_interval: 30s
    current:
      id: pond_sensor_current_ma
      name: Pond Sensor Current
      unit_of_measurement: mA
      device_class: current
      state_class: measurement
      accuracy_decimals: 2
      filters:
        - multiply: 1000.0
        - median:
            window_size: 5
            send_every: 1
            send_first_at: 1
        - exponential_moving_average:
            alpha: 0.3
            send_every: 1

  - platform: template
    name: Pond Water Depth
    unit_of_measurement: m
    device_class: distance
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    lambda: |-
      const float min_ma = ${depth_cal_min_ma};
      const float max_ma = ${depth_cal_max_ma};
      const float min_m = ${depth_cal_min_m};
      const float max_m = ${depth_cal_max_m};
      const float offset_m = ${depth_cal_offset_m};
      const float display_step_m = 0.01f;
      const uint32_t hold_time_ms = 300000UL;

      float current_ma = id(pond_sensor_current_ma).state;
      if (isnan(current_ma)) {
        return NAN;
      }

      // Clamp current to configured range.
      if (current_ma < min_ma) current_ma = min_ma;
      if (current_ma > max_ma) current_ma = max_ma;

      float depth_m = min_m + ((current_ma - min_ma) * (max_m - min_m) / (max_ma - min_ma));
      depth_m += offset_m;

      // Clamp output depth to configured range after offset.
      if (depth_m < min_m) depth_m = min_m;
      if (depth_m > max_m) depth_m = max_m;

      if (!id(pond_depth_has_displayed) || isnan(id(pond_depth_displayed_m))) {
        id(pond_depth_displayed_m) = depth_m;
        id(pond_depth_has_displayed) = true;
        id(pond_depth_pending_direction) = 0;
        id(pond_depth_pending_since_ms) = 0;
        return id(pond_depth_displayed_m);
      }

      float delta_m = depth_m - id(pond_depth_displayed_m);
      if (delta_m < 0.0f) delta_m = -delta_m;

      // Only start/continue a pending display change when raw depth stays at least
      // 0.01 m away from the currently displayed value.
      if (delta_m < display_step_m) {
        id(pond_depth_pending_direction) = 0;
        id(pond_depth_pending_since_ms) = 0;
        return id(pond_depth_displayed_m);
      }

      const int direction = (depth_m > id(pond_depth_displayed_m)) ? 1 : -1;
      const uint32_t now_ms = millis();

      if (id(pond_depth_pending_direction) != direction) {
        id(pond_depth_pending_direction) = direction;
        id(pond_depth_pending_since_ms) = now_ms;
        return id(pond_depth_displayed_m);
      }

      if ((now_ms - id(pond_depth_pending_since_ms)) >= hold_time_ms) {
        id(pond_depth_displayed_m) = depth_m;
        id(pond_depth_pending_direction) = 0;
        id(pond_depth_pending_since_ms) = 0;
      }

      return id(pond_depth_displayed_m);

  - platform: dallas_temp
    id: pond_temp_deep_raw
    internal: true
    address: ${ds18_addr_1}
    update_interval: 30s

  - platform: dallas_temp
    id: pond_temp_skimmer_raw
    internal: true
    address: ${ds18_addr_2}
    update_interval: 30s

  - platform: template
    id: pond_temp_deep
    name: Pond Water Temp Deep
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    lambda: |-
      float raw = id(pond_temp_deep_raw).state;

      if (!isnan(raw)) {
        id(pond_temp_deep_last_valid) = raw;
        id(pond_temp_deep_has_last_valid) = true;
        id(pond_temp_deep_error_count) = 0;
        return raw;
      }

      id(pond_temp_deep_error_count) += 1;

      // Keep last valid value through up to 3 consecutive read errors.
      if (id(pond_temp_deep_has_last_valid) && id(pond_temp_deep_error_count) <= 3) {
        return id(pond_temp_deep_last_valid);
      }

      return NAN;

  - platform: template
    id: pond_temp_skimmer
    name: Pond Water Temp Skimmer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: 30s
    lambda: |-
      float raw = id(pond_temp_skimmer_raw).state;

      if (!isnan(raw)) {
        id(pond_temp_skimmer_last_valid) = raw;
        id(pond_temp_skimmer_has_last_valid) = true;
        id(pond_temp_skimmer_error_count) = 0;
        return raw;
      }

      id(pond_temp_skimmer_error_count) += 1;

      // Keep last valid value through up to 3 consecutive read errors.
      if (id(pond_temp_skimmer_has_last_valid) && id(pond_temp_skimmer_error_count) <= 3) {
        return id(pond_temp_skimmer_last_valid);
      }

      return NAN;

binary_sensor:
  - platform: status
    name: Pond Node Status

button:
  - platform: restart
    name: Pond Node Restart

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Pond Node RGB LED
    pin: GPIO8
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    restore_mode: ALWAYS_OFF

interval:
  - interval: 3s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 0%
                blue: 100%
                brightness: 100%
            - delay: 500ms
            - light.turn_off: status_led
          else:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
            - delay: 150ms
            - light.turn_off: status_led
            - delay: 150ms
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
            - delay: 150ms
            - light.turn_off: status_led